<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velora - Photo Editor</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cropper.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        zinc: {
                            850: '#1f1f22',
                            950: '#0a0a0b',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            /* Adjustable UI Bloom/Glow Intensity */
            --glow-intensity: 0.6;
            
            /* Dark Mode (Spotify Inspired) */
            --bg-gradient: radial-gradient(circle at 50% -20%, #282828 0%, #121212 100%);
            --glass-bg: rgba(24, 24, 24, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-highlight: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            
            /* Spotify Green Accent */
            --accent: #1DB954;
            --accent-rgb: 29, 185, 84;
            
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-bg-hover: rgba(255, 255, 255, 0.1);
            --btn-primary-bg: var(--accent);
            --btn-primary-text: #000000;
            
            /* Reduced sizes */
            --nav-h: 60px;
            --panel-h: 28vh;
            --radius-panel: 24px;
            --radius-btn: 16px;
            --radius-card: 16px;
        }

        .light-mode {
            /* Light Mode */
            --bg-gradient: radial-gradient(circle at 50% -20%, #ffffff 0%, #e4e4e7 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-border-highlight: rgba(0, 0, 0, 0.15);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            
            --text-main: #121212;
            --text-sub: #535353;
            
            --accent: #1ed760;
            --accent-rgb: 30, 215, 96;
            
            --btn-bg: rgba(0, 0, 0, 0.03);
            --btn-bg-hover: rgba(0, 0, 0, 0.08);
            --btn-primary-bg: var(--accent);
            --btn-primary-text: #000000;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease, color 0.5s ease;
            overscroll-behavior-y: none;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
        }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Overlays (Loading & Exporting) */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-gradient);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 40px; 
            height: 40px;
            border: 3px solid var(--glass-border-highlight);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
            margin-bottom: 1rem;
            box-shadow: 0 0 calc(var(--glow-intensity) * 20px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.3));
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        .overlay-text {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--text-main);
            text-shadow: 0 0 calc(var(--glow-intensity) * 15px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.5));
            animation: pulse-text 2s infinite alternate;
        }

        @keyframes pulse-text {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Hide Scrollbar */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Cropper.js Overrides for Minimalist Aesthetic */
        .cropper-view-box, .cropper-face {
            border-radius: 0px;
        }
        .cropper-line {
            background-color: rgba(255, 255, 255, 0.8);
        }
        .cropper-point {
            background-color: #ffffff;
            width: 6px;
            height: 6px;
            opacity: 0.9;
        }
        .cropper-point.point-se {
            width: 8px;
            height: 8px;
        }
        .cropper-center {
            display: none;
        }
        .cropper-bg {
            background-image: none;
            background-color: #0a0a0b;
        }
        .cropper-modal {
            background-color: rgba(10, 10, 11, 0.85);
        }
        .cropper-dashed {
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        /* Grid Toggle Utility */
        #cropperContainer.hide-guides .cropper-dashed {
            display: none !important;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }

        /* Header */
        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        header h1 { 
            font-size: 1.2rem; 
            font-weight: 700; 
            letter-spacing: 0.05em; 
            text-transform: uppercase;
            text-shadow: 0 0 calc(var(--glow-intensity) * 15px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.5));
            transition: text-shadow 0.3s ease;
        }

        .icon-btn {
            background: var(--btn-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 1rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .icon-btn:active {
            transform: scale(0.92);
            background: var(--btn-bg-hover);
        }

        /* Main Preview Area */
        main {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 1rem calc(var(--nav-h) + 10px) 1rem;
            overflow: hidden;
            transition: padding 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* When panel is open, reduce image size instead of pushing it up too much */
        body.panel-open main {
            padding-bottom: calc(var(--panel-h) + var(--nav-h) + 20px);
        }

        body.panel-open canvas {
            max-height: 55vh;
        }

        #empty-state {
            text-align: center;
            padding: 2.5rem 2rem;
            border-radius: var(--radius-panel);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px dashed var(--glass-border-highlight);
            background: var(--btn-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 280px;
            width: 100%;
        }
        
        #empty-state:hover {
            background: var(--btn-bg-hover);
            border-color: var(--accent);
            box-shadow: 0 0 calc(var(--glow-intensity) * 30px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.4));
        }
        
        #empty-state:active { transform: scale(0.96); }
        #empty-state .icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; opacity: 0.8; }
        #empty-state h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; letter-spacing: 0.5px; }
        #empty-state p { color: var(--text-sub); font-size: 0.8rem; font-weight: 400; }

        #canvas-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #canvas-wrap.visible { display: flex; opacity: 1; }
        
        /* Ambient Bloom behind the canvas */
        #canvas-wrap::before {
            content: '';
            position: absolute;
            top: 10%; left: 10%; right: 10%; bottom: 10%;
            background: var(--accent);
            filter: blur(calc(var(--glow-intensity) * 60px));
            opacity: calc(var(--glow-intensity) * 0.15);
            z-index: -1;
            transition: all 0.3s ease;
            border-radius: 50%;
            pointer-events: none;
        }
        
        canvas {
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 calc(var(--glow-intensity) * 20px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.2));
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Floating Bottom Navigation */
        nav {
            position: fixed;
            bottom: 12px; 
            left: 12px; 
            right: 12px;
            height: var(--nav-h);
            display: flex;
            z-index: 100;
            border-radius: 100px;
            padding: 0 8px;
            margin-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none; 
            border: none;
            color: var(--text-sub);
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 100px;
            margin: 4px 2px;
            gap: 2px;
        }
        
        .nav-btn .icon { 
            font-size: 1.1rem; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
            opacity: 0.7;
        }
        
        .nav-btn.active { 
            color: var(--accent); 
            background: var(--btn-bg);
        }
        
        .nav-btn.active .icon { 
            transform: translateY(-1px) scale(1.1); 
            opacity: 1;
            text-shadow: 0 0 calc(var(--glow-intensity) * 25px) var(--accent);
        }

        /* Floating Panels - COMPACT VERSION */
        #panels {
            position: fixed;
            bottom: calc(var(--nav-h) + 20px + env(safe-area-inset-bottom)); 
            left: 12px; 
            right: 12px;
            border-radius: var(--radius-panel);
            transform: translateY(120%) scale(0.95);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 90;
            height: var(--panel-h);
            min-height: 180px;
            max-height: 240px;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }
        
        #panels.active { 
            transform: translateY(0) scale(1); 
            opacity: 1; 
            pointer-events: auto;
        }

        /* Close handle for panel */
        .panel-handle {
            width: 100%;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .panel-handle::before {
            content: '';
            width: 36px;
            height: 4px;
            background: var(--glass-border-highlight);
            border-radius: 2px;
        }

        .panel { 
            display: none; 
            padding: 0.5rem 1rem 1rem 1rem; 
            overflow-y: auto; 
            flex: 1; 
            scrollbar-width: none;
        }
        .panel::-webkit-scrollbar { display: none; }
        
        .panel.active { 
            display: block; 
            animation: fadeScale 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        @keyframes fadeScale { 
            from { opacity: 0; transform: translateY(10px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .panel-title { 
            font-size: 0.9rem; 
            font-weight: 600; 
            margin-bottom: 0.75rem; 
            letter-spacing: 0.5px; 
            color: var(--text-main); 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .panel-title::before, .panel-title::after {
            content: '';
            height: 1px;
            flex: 1;
            background: linear-gradient(to right, transparent, var(--glass-border-highlight), transparent);
        }

        /* Buttons - Compact */
        .btn {
            background: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 10px 16px;
            border-radius: var(--radius-btn);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            width: 100%; 
            margin-bottom: 0.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .btn:active { transform: scale(0.96); }
        .btn:hover { background: var(--btn-bg-hover); border-color: var(--glass-border-highlight); }
        
        .btn-primary { 
            background: var(--btn-primary-bg); 
            color: var(--btn-primary-text); 
            border: none; 
            font-weight: 700;
            box-shadow: 0 4px calc(var(--glow-intensity) * 25px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.5));
        }
        
        .btn-primary:hover { 
            box-shadow: 0 6px calc(var(--glow-intensity) * 35px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.7)); 
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: scale(0.96); }
        
        .row { display: flex; gap: 0.75rem; }

        /* Minimalist Sliders - Compact */
        .slider-group { margin-bottom: 0.75rem; }
        .slider-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 0.4rem; 
            font-size: 0.75rem; 
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.3px;
        }
        .slider-val { color: var(--text-sub); font-variant-numeric: tabular-nums; font-weight: 400; font-size: 0.7rem; }
        
        input[type=range] { 
            -webkit-appearance: none; 
            width: 100%; 
            height: 3px; 
            background: var(--glass-border);
            border-radius: 2px;
            outline: none;
            position: relative;
        }
        
        /* Custom filled track effect using linear-gradient via JS variable --p */
        input[type=range] {
            background: linear-gradient(to right, var(--accent) var(--p, 50%), var(--glass-border) var(--p, 50%));
            box-shadow: 0 0 calc(var(--glow-intensity) * 10px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.2));
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; 
            height: 14px; 
            width: 14px; 
            border-radius: 50%;
            background: var(--accent); 
            cursor: pointer; 
            box-shadow: 0 0 calc(var(--glow-intensity) * 20px) var(--accent);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            border: 2px solid var(--bg-gradient); 
        }
        
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.3);
            box-shadow: 0 0 calc(var(--glow-intensity) * 30px) var(--accent);
        }

        /* Presets (Glass Cards with Background Images) - COMPACT */
        .presets-scroll { 
            display: flex; 
            overflow-x: auto; 
            gap: 0.75rem; 
            padding-bottom: 0.5rem; 
            scrollbar-width: none; 
            padding-left: 2px;
            padding-right: 2px;
        }
        .presets-scroll::-webkit-scrollbar { display: none; }
        
        .preset-card {
            min-width: 72px; 
            height: 90px; 
            border-radius: var(--radius-card);
            background-color: var(--btn-bg); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 1px solid var(--glass-border);
            display: flex; 
            align-items: flex-end; 
            justify-content: center;
            padding: 0.6rem 0.4rem; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .preset-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.8));
            z-index: 1;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        
        .preset-card span { 
            font-size: 0.65rem; 
            font-weight: 600; 
            color: #ffffff;
            line-height: 1.1;
            text-align: center;
            z-index: 2;
            position: relative;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        .preset-card:active { transform: scale(0.94); }
        .preset-card:hover { 
            border-color: var(--glass-border-highlight);
        }
        .preset-card.active { 
            border-color: var(--accent);
            box-shadow: 0 0 calc(var(--glow-intensity) * 20px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.4));
            transform: translateY(-2px);
        }
        .preset-card.active::before { opacity: 0.9; background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.9)); }

        /* Creator Tab - Compact */
        .creator-wrap { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding: 0.5rem 0; 
            height: 100%;
        }
        .creator-title {
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: 0.15em; 
            text-align: center;
            margin-bottom: 0.25rem;
            color: var(--text-main);
            text-shadow: 0 0 calc(var(--glow-intensity) * 25px) rgba(var(--accent-rgb), calc(var(--glow-intensity) * 0.6));
            animation: breathe 4s infinite alternate ease-in-out;
        }
        .creator-sub { 
            font-size: 0.7rem; 
            color: var(--text-sub); 
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        
        @keyframes breathe {
            0% { filter: brightness(1); transform: scale(0.98); }
            100% { filter: brightness(1.2); transform: scale(1.02); }
        }
        
        #file-input { display: none; }

        /* Cropper Phase Specific Styles */
        .cropper-phase #canvas-wrap { display: none !important; }
        .cropper-phase #panels { display: none !important; }
        .cropper-phase nav { display: none !important; }
        .cropper-phase main { padding-bottom: 100px; }
        
        .editor-phase #cropperContainer { display: none !important; }
        .editor-phase #cropperFooter { display: none !important; }

        /* Cropper Footer - Compact */
        #cropperFooter {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
            padding: 0 1rem;
        }

        .cropper-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-sub);
            font-size: 0.65rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 10px;
        }

        .cropper-btn:hover {
            color: var(--text-main);
            background: var(--btn-bg-hover);
        }

        .cropper-btn.primary {
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 600;
        }

        .cropper-btn.primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 calc(var(--glow-intensity) * 20px) rgba(var(--accent-rgb), 0.5);
        }

        /* Aspect Ratio Presets in Cropper - Compact */
        .ratio-preset {
            min-width: 48px;
            height: 48px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: var(--btn-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-sub);
            flex-shrink: 0;
        }

        .ratio-preset:hover {
            border-color: var(--glass-border-highlight);
            color: var(--text-main);
        }

        .ratio-preset.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(var(--accent-rgb), 0.1);
        }

        .ratio-preset .ratio-icon {
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-radius: 2px;
        }

        .ratio-preset[data-ratio="NaN"] .ratio-icon {
            border-style: dashed;
        }

        .ratio-preset[data-ratio="1"] .ratio-icon {
            width: 16px;
            height: 16px;
        }

        .ratio-preset[data-ratio="1.3333333333333333"] .ratio-icon {
            width: 20px;
            height: 14px;
        }

        .ratio-preset[data-ratio="0.75"] .ratio-icon {
            width: 14px;
            height: 20px;
        }

        .ratio-preset[data-ratio="1.7777777777777777"] .ratio-icon {
            width: 22px;
            height: 12px;
        }

        .ratio-preset[data-ratio="0.5625"] .ratio-icon {
            width: 12px;
            height: 22px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        /* Two column layout for sliders */
        .sliders-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 1rem;
        }

        @media (max-width: 380px) {
            .sliders-grid {
                grid-template-columns: 1fr;
            }
            
            .preset-card {
                min-width: 64px;
                height: 80px;
            }
        }
    </style>
</head>
<body class="cropper-phase">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay active">
        <div class="spinner"></div>
        <div class="overlay-text">VELORA</div>
    </div>

    <!-- Export Overlay -->
    <div id="export-overlay" class="overlay">
        <div class="spinner"></div>
        <div class="overlay-text">EXPORTING...</div>
    </div>

    <header>
        <h1>Velora</h1>
        <button id="theme-toggle" class="icon-btn">
            <i data-lucide="sun" class="w-5 h-5"></i>
        </button>
    </header>

    <main id="main">
        <!-- Empty State -->
        <div id="empty-state">
            <span class="icon">
                <i data-lucide="image-plus" class="w-8 h-8 mx-auto mb-2"></i>
            </span>
            <h3>Select a photo</h3>
            <p>Tap to upload and start editing</p>
        </div>

        <!-- Cropper Container -->
        <div id="cropperContainer" class="absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-500 flex items-center justify-center p-4 lg:p-12 pb-24">
            <img id="imageToCrop" src="" alt="Workspace" class="max-w-full max-h-full object-contain">
        </div>

        <!-- Editor Canvas -->
        <div id="canvas-wrap">
            <canvas id="canvas"></canvas>
        </div>
        
        <input type="file" id="file-input" accept="image/*">
    </main>

    <!-- Cropper Footer -->
    <footer id="cropperFooter">
        <div class="flex items-center gap-2 overflow-x-auto hide-scrollbar">
            <button class="ratio-preset active" data-ratio="NaN">
                <div class="ratio-icon"></div>
                <span class="text-[9px] uppercase">Free</span>
            </button>
            <button class="ratio-preset" data-ratio="1">
                <div class="ratio-icon"></div>
                <span class="text-[9px] uppercase">1:1</span>
            </button>
            <button class="ratio-preset" data-ratio="1.3333333333333333">
                <div class="ratio-icon"></div>
                <span class="text-[9px] uppercase">4:3</span>
            </button>
            <button class="ratio-preset" data-ratio="0.75">
                <div class="ratio-icon"></div>
                <span class="text-[9px] uppercase">3:4</span>
            </button>
            <button class="ratio-preset" data-ratio="1.7777777777777777">
                <div class="ratio-icon"></div>
                <span class="text-[9px] uppercase">16:9</span>
            </button>
            <button class="ratio-preset" data-ratio="0.5625">
                <div class="ratio-icon"></div>
                <span class="text-[9px] uppercase">9:16</span>
            </button>
        </div>
        
        <div class="flex items-center gap-2 ml-2 pl-2 border-l border-white/10">
            <button class="cropper-btn" id="btnRotateL">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                <span>Rotate</span>
            </button>
            <button class="cropper-btn" id="btnFlipH">
                <i data-lucide="flip-horizontal" class="w-4 h-4"></i>
                <span>Flip</span>
            </button>
            <button class="cropper-btn primary" id="btnConfirmCrop">
                <i data-lucide="check" class="w-4 h-4"></i>
                <span>Apply</span>
            </button>
        </div>
    </footer>

    <!-- Editor Panels -->
    <div id="panels" class="glass-panel">
        <!-- Drag handle to close -->
        <div class="panel-handle" id="panelHandle"></div>
        
        <!-- Edit -->
        <div class="panel" id="p-edit">
            <div class="panel-title">Edit</div>
            <button class="btn" id="btn-upload">
                <i data-lucide="folder-open" class="w-4 h-4"></i> Open New Image
            </button>
            <div class="row">
                <button class="btn" id="btn-compare">
                    <i data-lucide="scan" class="w-4 h-4"></i> Compare
                </button>
                <button class="btn" id="btn-reset">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset
                </button>
            </div>
            <button class="btn btn-primary" id="btn-export">
                <i data-lucide="download" class="w-4 h-4"></i> Export
            </button>
        </div>

        <!-- Looks -->
        <div class="panel" id="p-looks">
            <div class="panel-title">Looks</div>
            <div class="presets-scroll" id="presets-container"></div>
        </div>

        <!-- Control -->
        <div class="panel" id="p-control">
            <div class="panel-title">Adjust</div>
            <div class="sliders-grid" id="sliders-control"></div>
        </div>

        <!-- FX -->
        <div class="panel" id="p-fx">
            <div class="panel-title">Effects</div>
            <div class="sliders-grid" id="sliders-fx"></div>
        </div>

        <!-- Creator & Settings -->
        <div class="panel" id="p-creator">
            <div class="creator-wrap">
                <div class="creator-title">BHAT BOYKA</div>
                <div class="creator-sub">Velora Visionary</div>
                
                <div style="width: 100%; max-width: 280px;">
                    <div class="slider-group">
                        <div class="slider-header">
                            <span>UI Bloom</span>
                            <span class="slider-val" id="val-ui-glow">0.60</span>
                        </div>
                        <input type="range" id="sl-ui-glow" min="0" max="2" step="0.01" value="0.6">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Editor Navigation -->
    <nav class="glass-panel">
        <button class="nav-btn" data-target="edit">
            <span class="icon"><i data-lucide="folder-open" class="w-4 h-4"></i></span>
            <span>Edit</span>
        </button>
        <button class="nav-btn" data-target="looks">
            <span class="icon"><i data-lucide="sparkles" class="w-4 h-4"></i></span>
            <span>Looks</span>
        </button>
        <button class="nav-btn" data-target="control">
            <span class="icon"><i data-lucide="sliders-horizontal" class="w-4 h-4"></i></span>
            <span>Adjust</span>
        </button>
        <button class="nav-btn" data-target="fx">
            <span class="icon"><i data-lucide="wand-2" class="w-4 h-4"></i></span>
            <span>FX</span>
        </button>
        <button class="nav-btn" data-target="creator">
            <span class="icon"><i data-lucide="user" class="w-4 h-4"></i></span>
            <span>Creator</span>
        </button>
    </nav>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // --- INITIAL LOAD ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.remove('active');
            }, 800);
        });

        // --- THEME TOGGLE ---
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            const icon = themeToggle.querySelector('i');
            icon.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
            lucide.createIcons();
            triggerRender(); 
        });

        // --- CONFIG & STATE ---
        const defState = {
            brightness: 1, contrast: 1, saturation: 1, exposure: 0, fade: 0, warmth: 0, sharpness: 0,
            blur: 0, grain: 0, vignette: 0, glow: 0, lightLeak: 0, dust: 0, clarity: 0
        };

        let state = { ...defState };
        let imgOrig = null;
        let imgPreview = null;
        let isCompare = false;
        let cropper = null;
        let croppedImageData = null;

        const presets = {
            'Boyka': { brightness: 1.05, contrast: 1.1, saturation: 1.1, exposure: 0, fade: 0.1, warmth: 0.2, sharpness: 0.1, blur: 0, grain: 0.3, vignette: 0.4, glow: 0, lightLeak: 0, dust: 0, clarity: 0.1 },
            'Cinematic': { brightness: 1, contrast: 1.3, saturation: 0.9, exposure: -0.1, fade: 0.2, warmth: -0.1, sharpness: 0, blur: 0, grain: 0.2, vignette: 0.5, glow: 0, lightLeak: 0, dust: 0, clarity: 0.2 },
            'Vintage': { brightness: 1, contrast: 0.9, saturation: 0.7, exposure: 0.1, fade: 0.3, warmth: 0.4, sharpness: 0, blur: 1, grain: 0.6, vignette: 0.3, glow: 0.1, lightLeak: 0.2, dust: 0.4, clarity: 0 },
            'Noir': { brightness: 1, contrast: 1.4, saturation: 0, exposure: -0.1, fade: 0, warmth: 0, sharpness: 0, blur: 0, grain: 0.4, vignette: 0.6, glow: 0, lightLeak: 0, dust: 0.1, clarity: 0.3 },
            'Cool': { brightness: 1.05, contrast: 1.05, saturation: 0.8, exposure: 0, fade: 0.1, warmth: -0.4, sharpness: 0, blur: 0, grain: 0.1, vignette: 0.2, glow: 0, lightLeak: 0, dust: 0, clarity: 0.1 },
            'Glow': { brightness: 1.1, contrast: 1.05, saturation: 1.1, exposure: 0.1, fade: 0, warmth: 0.3, sharpness: 0, blur: 0, grain: 0, vignette: 0.1, glow: 0.4, lightLeak: 0.1, dust: 0, clarity: 0 },
            'Pastel': { brightness: 1.15, contrast: 0.85, saturation: 0.9, exposure: 0.2, fade: 0.2, warmth: 0.1, sharpness: 0, blur: 0, grain: 0.1, vignette: 0, glow: 0.2, lightLeak: 0, dust: 0, clarity: -0.2 },
            'Mood': { brightness: 0.9, contrast: 1.2, saturation: 0.8, exposure: -0.3, fade: 0, warmth: -0.2, sharpness: 0, blur: 0, grain: 0.2, vignette: 0.7, glow: 0, lightLeak: 0, dust: 0, clarity: 0.2 },
            'Clean': { brightness: 1.02, contrast: 1.1, saturation: 1.05, exposure: 0, fade: 0, warmth: 0, sharpness: 0.2, blur: 0, grain: 0, vignette: 0.1, glow: 0, lightLeak: 0, dust: 0, clarity: 0.1 }
        };

        const controls = [
            { id: 'brightness', label: 'Brightness', min: 0.5, max: 1.5, step: 0.01, def: 1 },
            { id: 'contrast', label: 'Contrast', min: 0.5, max: 1.5, step: 0.01, def: 1 },
            { id: 'saturation', label: 'Saturation', min: 0, max: 2, step: 0.01, def: 1 },
            { id: 'exposure', label: 'Exposure', min: -1, max: 1, step: 0.01, def: 0 },
            { id: 'fade', label: 'Fade', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'warmth', label: 'Warmth', min: -1, max: 1, step: 0.01, def: 0 },
            { id: 'sharpness', label: 'Sharpness', min: 0, max: 1, step: 0.01, def: 0 }
        ];

        const fx = [
            { id: 'blur', label: 'Blur', min: 0, max: 10, step: 0.1, def: 0 },
            { id: 'grain', label: 'Grain', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'vignette', label: 'Vignette', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'glow', label: 'Glow', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'lightLeak', label: 'Leak', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'dust', label: 'Dust', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'clarity', label: 'Clarity', min: -1, max: 1, step: 0.01, def: 0 }
        ];

        // --- DOM ---
        const $ = id => document.getElementById(id);
        const canvas = $('canvas');
        const ctx = canvas.getContext('2d');
        const panelsWrap = $('panels');
        const navBtns = document.querySelectorAll('.nav-btn');

        // --- PATTERNS ---
        let patGrain, patDust;
        function initPatterns() {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const x = c.getContext('2d');
            
            const idata = x.createImageData(256, 256);
            for(let i=0; i<idata.data.length; i+=4) {
                const v = Math.random()*255;
                idata.data[i] = idata.data[i+1] = idata.data[i+2] = v;
                idata.data[i+3] = 150;
            }
            x.putImageData(idata, 0, 0);
            patGrain = ctx.createPattern(c, 'repeat');

            x.clearRect(0,0,256,256);
            x.fillStyle = '#fff';
            for(let i=0; i<80; i++) {
                x.beginPath(); x.arc(Math.random()*256, Math.random()*256, Math.random()*1.2, 0, Math.PI*2); x.fill();
            }
            x.strokeStyle = '#fff';
            for(let i=0; i<10; i++) {
                x.beginPath(); x.moveTo(Math.random()*256, Math.random()*256); x.lineTo(Math.random()*256, Math.random()*256);
                x.lineWidth = Math.random(); x.stroke();
            }
            patDust = ctx.createPattern(c, 'repeat');
        }
        initPatterns();

        // --- UI BUILDER ---
        function updateSliderFill(el) {
            const min = parseFloat(el.min);
            const max = parseFloat(el.max);
            const val = parseFloat(el.value);
            const pct = ((val - min) / (max - min)) * 100;
            el.style.setProperty('--p', `${pct}%`);
        }

        function buildSliders(containerId, config) {
            const cont = $(containerId);
            config.forEach(c => {
                cont.innerHTML += `
                    <div class="slider-group">
                        <div class="slider-header"><span>${c.label}</span><span class="slider-val" id="val-${c.id}">${c.def.toFixed(2)}</span></div>
                        <input type="range" id="sl-${c.id}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.def}">
                    </div>
                `;
            });
            config.forEach(c => {
                const slider = $(`sl-${c.id}`);
                updateSliderFill(slider); 
                
                slider.addEventListener('input', e => {
                    state[c.id] = parseFloat(e.target.value);
                    $(`val-${c.id}`).innerText = state[c.id].toFixed(2);
                    updateSliderFill(e.target);
                    document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
                    triggerRender();
                });
            });
        }

        function buildPresets() {
            const cont = $('presets-container');
            Object.keys(presets).forEach(k => {
                const div = document.createElement('div');
                div.className = 'preset-card';
                div.id = `preset-card-${k.replace(/\s+/g, '-')}`;
                div.innerHTML = `<span>${k}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    state = { ...defState, ...presets[k] };
                    updateSlidersUI();
                    triggerRender();
                };
                cont.appendChild(div);
            });
        }

        function updateSlidersUI() {
            [...controls, ...fx].forEach(c => {
                const slider = $(`sl-${c.id}`);
                if(slider) {
                    slider.value = state[c.id];
                    $(`val-${c.id}`).innerText = state[c.id].toFixed(2);
                    updateSliderFill(slider);
                }
            });
        }

        buildSliders('sliders-control', controls);
        buildSliders('sliders-fx', fx);
        buildPresets();

        // --- PRESET THUMBNAIL GENERATOR ---
        function generatePresetThumbnails(sourceImg) {
            const maxThumb = 150;
            let w = sourceImg.width, h = sourceImg.height;
            if (w > maxThumb || h > maxThumb) {
                const r = Math.min(maxThumb/w, maxThumb/h);
                w *= r; h *= r;
            }
            
            const tCanvas = document.createElement('canvas');
            tCanvas.width = w; tCanvas.height = h;
            const tCtx = tCanvas.getContext('2d');
            tCtx.drawImage(sourceImg, 0, 0, w, h);
            
            const thumbImg = new Image();
            thumbImg.onload = () => {
                const renderCanvas = document.createElement('canvas');
                const renderCtx = renderCanvas.getContext('2d');
                
                Object.keys(presets).forEach(k => {
                    const presetState = { ...defState, ...presets[k] };
                    draw(renderCanvas, renderCtx, thumbImg, presetState);
                    const dataUrl = renderCanvas.toDataURL('image/jpeg', 0.6);
                    const card = document.getElementById(`preset-card-${k.replace(/\s+/g, '-')}`);
                    if(card) {
                        card.style.backgroundImage = `url(${dataUrl})`;
                    }
                });
            };
            thumbImg.src = tCanvas.toDataURL('image/jpeg', 0.8);
        }

        // --- UI BLOOM SLIDER LOGIC ---
        const uiGlowSlider = $('sl-ui-glow');
        const uiGlowVal = $('val-ui-glow');
        updateSliderFill(uiGlowSlider);
        
        uiGlowSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            uiGlowVal.innerText = val.toFixed(2);
            document.documentElement.style.setProperty('--glow-intensity', val);
            updateSliderFill(e.target);
        });

        // --- NAVIGATION ---
        navBtns.forEach(btn => {
            btn.onclick = () => {
                const target = btn.dataset.target;
                
                if(btn.classList.contains('active') && panelsWrap.classList.contains('active')) {
                    closePanel();
                    return;
                }

                navBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                $(`p-${target}`).classList.add('active');
                panelsWrap.classList.add('active');
                document.body.classList.add('panel-open');
            };
        });

        function closePanel() {
            panelsWrap.classList.remove('active');
            document.body.classList.remove('panel-open');
            navBtns.forEach(b => b.classList.remove('active'));
        }

        // Close panel via handle
        $('panelHandle').addEventListener('click', closePanel);

        // Close panel when clicking main area
        $('main').addEventListener('click', (e) => {
            if(e.target === $('main') || e.target.closest('#canvas-wrap')) {
                closePanel();
            }
        });

        // --- CROPPER PHASE ---
        const emptyState = $('empty-state');
        const cropperContainer = $('cropperContainer');
        const imageToCrop = $('imageToCrop');
        const cropperFooter = $('cropperFooter');

        $('empty-state').onclick = () => $('file-input').click();
        $('btn-upload').onclick = () => {
            $('file-input').click();
            closePanel();
        };

        $('file-input').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            
            $('loading-overlay').classList.add('active');
            
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    imgOrig = img;
                    imageToCrop.src = ev.target.result;
                    
                    emptyState.style.display = 'none';
                    cropperContainer.classList.remove('opacity-0', 'pointer-events-none');
                    cropperContainer.classList.add('opacity-100');
                    
                    document.body.classList.remove('editor-phase');
                    document.body.classList.add('cropper-phase');
                    
                    initCropper();
                    
                    setTimeout(() => {
                        $('loading-overlay').classList.remove('active');
                    }, 500);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function initCropper() {
            if(cropper) cropper.destroy();
            
            cropper = new Cropper(imageToCrop, {
                viewMode: 1,
                dragMode: 'crop',
                autoCropArea: 0.8,
                restore: false,
                guides: true,
                center: false,
                highlight: false,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: false,
                zoomable: true,
                wheelZoomRatio: 0.1
            });
        }

        document.querySelectorAll('.ratio-preset').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ratio-preset').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const ratio = parseFloat(btn.dataset.ratio);
                cropper.setAspectRatio(ratio);
            });
        });

        $('btnRotateL').onclick = () => cropper.rotate(-90);
        
        let scaleX = 1;
        $('btnFlipH').onclick = () => {
            scaleX = scaleX === 1 ? -1 : 1;
            cropper.scaleX(scaleX);
        };

        $('btnConfirmCrop').onclick = () => {
            if(!cropper) return;
            
            $('loading-overlay').classList.add('active');
            
            setTimeout(() => {
                const croppedCanvas = cropper.getCroppedCanvas({
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                });
                
                croppedImageData = croppedCanvas.toDataURL('image/jpeg', 0.95);
                
                const img = new Image();
                img.onload = () => {
                    const max = 1200;
                    let w = img.width, h = img.height;
                    if(w > max || h > max) {
                        const r = Math.min(max/w, max/h);
                        w *= r; h *= r;
                    }
                    
                    const pc = document.createElement('canvas');
                    pc.width = w; pc.height = h;
                    pc.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    const pImg = new Image();
                    pImg.onload = () => {
                        imgPreview = pImg;
                        
                        document.body.classList.remove('cropper-phase');
                        document.body.classList.add('editor-phase');
                        
                        $('canvas-wrap').classList.add('visible');
                        state = { ...defState };
                        updateSlidersUI();
                        document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
                        
                        generatePresetThumbnails(pImg);
                        triggerRender();
                        
                        $('loading-overlay').classList.remove('active');
                        
                        setTimeout(() => navBtns[1].click(), 300);
                    };
                    pImg.src = pc.toDataURL('image/jpeg', 0.8);
                };
                img.src = croppedImageData;
            }, 100);
        };

        // --- RENDER ENGINE ---
        let renderFrame = null;
        let isRendering = false;
        let renderQueued = false;

        function triggerRender() {
            if (isRendering) {
                renderQueued = true;
                return;
            }
            
            isRendering = true;
            renderFrame = requestAnimationFrame(() => {
                draw(canvas, ctx, imgPreview, state);
                isRendering = false;
                
                if (renderQueued) {
                    renderQueued = false;
                    setTimeout(triggerRender, 5);
                }
            });
        }

        function draw(cvs, cx, img, renderState = state) {
            if(!img) return;
            cvs.width = img.width; cvs.height = img.height;
            const w = cvs.width, h = cvs.height;

            if(isCompare && renderState === state) {
                cx.drawImage(img, 0, 0, w, h);
                return;
            }

            const b = renderState.brightness + renderState.exposure;
            const c = renderState.contrast + (renderState.clarity * 0.2);
            const s = renderState.saturation + (renderState.clarity * 0.1);
            const bl = renderState.blur;
            
            cx.filter = `brightness(${b}) contrast(${c}) saturate(${s}) blur(${bl}px)`;
            cx.drawImage(img, 0, 0, w, h);
            cx.filter = 'none';

            if(renderState.warmth !== 0) {
                cx.globalCompositeOperation = 'overlay';
                cx.fillStyle = renderState.warmth > 0 ? `rgba(255,140,0,${renderState.warmth*0.35})` : `rgba(0,130,255,${-renderState.warmth*0.35})`;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.fade > 0) {
                cx.globalCompositeOperation = 'screen';
                cx.fillStyle = `rgba(40,40,40,${renderState.fade*0.6})`;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.sharpness > 0 || renderState.clarity > 0) {
                cx.globalCompositeOperation = 'overlay';
                cx.globalAlpha = (renderState.sharpness * 0.5) + (renderState.clarity * 0.3);
                cx.filter = 'contrast(1.5) grayscale(1)';
                cx.drawImage(img, 0, 0, w, h);
                cx.filter = 'none';
                cx.globalAlpha = 1;
            }

            if(renderState.glow > 0) {
                cx.globalCompositeOperation = 'screen';
                cx.globalAlpha = renderState.glow * 0.6;
                cx.filter = 'blur(15px) contrast(1.2)';
                cx.drawImage(img, 0, 0, w, h);
                cx.filter = 'none';
                cx.globalAlpha = 1;
            }

            if(renderState.lightLeak > 0) {
                cx.globalCompositeOperation = 'screen';
                const grad = cx.createLinearGradient(0, 0, w*0.6, h*0.6);
                grad.addColorStop(0, `rgba(255, 100, 50, ${renderState.lightLeak * 0.7})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                cx.fillStyle = grad;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.vignette > 0) {
                cx.globalCompositeOperation = 'multiply';
                const grad = cx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.7);
                grad.addColorStop(0.4, 'rgba(255,255,255,1)');
                grad.addColorStop(1, `rgba(150,150,150,${1 - renderState.vignette})`);
                cx.fillStyle = grad;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.grain > 0) {
                cx.globalCompositeOperation = 'overlay';
                cx.globalAlpha = renderState.grain * 0.8;
                cx.fillStyle = patGrain;
                cx.fillRect(0,0,w,h);
                cx.globalAlpha = 1;
            }

            if(renderState.dust > 0) {
                cx.globalCompositeOperation = 'screen';
                cx.globalAlpha = renderState.dust * 0.7;
                cx.fillStyle = patDust;
                cx.fillRect(0,0,w,h);
                cx.globalAlpha = 1;
            }

            cx.globalCompositeOperation = 'source-over';
        }

        // --- EDITOR ACTIONS ---
        $('btn-reset').onclick = () => {
            state = { ...defState };
            updateSlidersUI();
            document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
            triggerRender();
        };

        const compBtn = $('btn-compare');
        const startComp = () => { isCompare = true; triggerRender(); };
        const endComp = () => { isCompare = false; triggerRender(); };
        compBtn.onmousedown = startComp; compBtn.onmouseup = endComp; compBtn.onmouseleave = endComp;
        compBtn.ontouchstart = (e) => { e.preventDefault(); startComp(); };
        compBtn.ontouchend = endComp;

        $('btn-export').onclick = () => {
            if(!imgPreview) return;
            
            $('export-overlay').classList.add('active');
            
            setTimeout(() => {
                const img = new Image();
                img.onload = () => {
                    const expCanvas = document.createElement('canvas');
                    const expCtx = expCanvas.getContext('2d');
                    expCanvas.width = img.width;
                    expCanvas.height = img.height;
                    
                    draw(expCanvas, expCtx, img, state);
                    
                    const link = document.createElement('a');
                    link.download = `Velora_${Date.now()}.png`;
                    link.href = expCanvas.toDataURL('image/png');
                    link.click();
                    
                    setTimeout(() => {
                        $('export-overlay').classList.remove('active');
                    }, 800);
                };
                img.src = croppedImageData;
            }, 100);
        };

    </script>
</body>
