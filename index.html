<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Velora - Photo Editor</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cropper.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            /* Light Mode (Default) */
            --primary-bg: #fafafa;
            --surface: #ffffff;
            --primary-text: #1a1a1a;
            --secondary-text: #737373;
            --border: #e5e5e5;
            --accent: #1a1a1a;
            --accent-rgb: 26, 26, 26;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.12);
            
            /* UI Variables */
            --nav-h: 60px;
            --panel-h: 32vh;
            --radius-panel: 20px;
            --radius-btn: 12px;
            --radius-card: 16px;
            
            /* Frame settings */
            --frame-padding: 0;
            --frame-radius: 8;
            --frame-color: #ffffff;
            --frame-shadow: 0;
        }

        .dark-mode {
            /* Dark Mode */
            --primary-bg: #0a0a0a;
            --surface: #141414;
            --primary-text: #fafafa;
            --secondary-text: #a3a3a3;
            --border: #262626;
            --accent: #ffffff;
            --accent-rgb: 255, 255, 255;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
            --shadow-xl: 0 20px 40px rgba(0,0,0,0.6);
            --frame-color: #1a1a1a;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: var(--primary-bg);
            color: var(--primary-text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior-y: none;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
        }
        
        .dark-mode .glass {
            background: rgba(20, 20, 20, 0.85);
        }

        .glass-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--primary-bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 36px; 
            height: 36px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        .overlay-text {
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: var(--primary-text);
            text-transform: uppercase;
        }

        /* Hide Scrollbar */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Cropper.js Overrides */
        .cropper-view-box, .cropper-face {
            border-radius: 0px;
        }
        .cropper-line {
            background-color: var(--accent);
            opacity: 0.8;
        }
        .cropper-point {
            background-color: var(--accent);
            width: 6px;
            height: 6px;
            opacity: 1;
        }
        .cropper-point.point-se {
            width: 8px;
            height: 8px;
        }
        .cropper-center {
            display: none;
        }
        .cropper-bg {
            background-image: none;
            background-color: var(--primary-bg);
        }
        .cropper-modal {
            background-color: var(--primary-bg);
            opacity: 0.9;
        }
        .cropper-dashed {
            border-color: rgba(128, 128, 128, 0.3);
        }
        
        #cropperContainer.hide-guides .cropper-dashed {
            display: none !important;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .animate-float { animation: float 6s ease-in-out infinite; }

        /* Header */
        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        header h1 { 
            font-size: 1.1rem; 
            font-weight: 600; 
            letter-spacing: -0.02em;
            color: var(--primary-text);
        }

        .icon-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--primary-text);
            font-size: 1rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .icon-btn:hover {
            background: var(--primary-bg);
            border-color: var(--secondary-text);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        /* Main Preview Area */
        main {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 1rem calc(var(--nav-h) + 10px) 1rem;
            overflow: hidden;
            transition: padding 0.4s ease;
        }

        body.panel-open main {
            padding-bottom: calc(var(--panel-h) + var(--nav-h) + 20px);
        }

        body.panel-open #canvas-frame {
            max-height: 50vh;
        }

        #empty-state {
            text-align: center;
            padding: 2.5rem 2rem;
            border-radius: var(--radius-panel);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px dashed var(--border);
            background: var(--surface);
            max-width: 280px;
            width: 100%;
            box-shadow: var(--shadow-md);
        }
        
        #empty-state:hover {
            border-color: var(--secondary-text);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        #empty-state:active { transform: scale(0.98); }
        #empty-state .icon { 
            font-size: 2rem; 
            margin-bottom: 0.75rem; 
            display: block; 
            color: var(--secondary-text);
        }
        #empty-state h3 { 
            font-size: 1rem; 
            font-weight: 600; 
            margin-bottom: 0.25rem; 
            color: var(--primary-text);
        }
        #empty-state p { 
            color: var(--secondary-text); 
            font-size: 0.8rem; 
            font-weight: 400; 
        }

        #cropperContainer {
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem 6rem 1rem;
        }
        
        #cropperContainer.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #canvas-frame {
            position: relative;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            max-width: 100%;
            max-height: 75vh;
            padding: calc(var(--frame-padding) * 1px);
            background: var(--frame-color);
            border-radius: calc(var(--frame-radius) * 1px);
            box-shadow: 
                0 calc(var(--frame-shadow) * 0.5px) calc(var(--frame-shadow) * 1px) rgba(0,0,0,calc(0.1 + var(--frame-shadow) * 0.005)),
                0 calc(var(--frame-shadow) * 2px) calc(var(--frame-shadow) * 4px) rgba(0,0,0,calc(0.1 + var(--frame-shadow) * 0.005));
        }
        
        #canvas-frame.visible { 
            display: flex; 
            opacity: 1; 
        }

        #canvas-frame canvas {
            border-radius: calc(var(--frame-radius) * 0.5px);
            display: block;
            max-width: 100%;
            max-height: 70vh;
        }

        /* Floating Bottom Navigation */
        nav {
            position: fixed;
            bottom: 12px; 
            left: 12px; 
            right: 12px;
            height: var(--nav-h);
            display: flex;
            z-index: 100;
            border-radius: 100px;
            padding: 0 6px;
            margin-bottom: env(safe-area-inset-bottom);
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none; 
            border: none;
            color: var(--secondary-text);
            font-size: 0.55rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 100px;
            margin: 4px 2px;
            gap: 2px;
        }
        
        .nav-btn .icon { 
            font-size: 1rem; 
            transition: all 0.2s ease; 
        }
        
        .nav-btn:hover {
            color: var(--primary-text);
        }
        
        .nav-btn.active { 
            color: var(--accent); 
            background: rgba(128, 128, 128, 0.1);
            font-weight: 600;
        }
        
        .nav-btn.active .icon { 
            transform: scale(1.1); 
        }

        /* Floating Panels */
        #panels {
            position: fixed;
            bottom: calc(var(--nav-h) + 20px + env(safe-area-inset-bottom)); 
            left: 12px; 
            right: 12px;
            border-radius: var(--radius-panel);
            transform: translateY(120%) scale(0.95);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 90;
            height: var(--panel-h);
            min-height: 200px;
            max-height: 280px;
            display: flex;
            flex-direction: column;
            pointer-events: none;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
        }
        
        #panels.active { 
            transform: translateY(0) scale(1); 
            opacity: 1; 
            pointer-events: auto;
        }

        .panel-handle {
            width: 100%;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .panel-handle::before {
            content: '';
            width: 32px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .panel { 
            display: none; 
            padding: 0.5rem 1rem 1rem 1rem; 
            overflow-y: auto; 
            flex: 1; 
            scrollbar-width: none;
        }
        .panel::-webkit-scrollbar { display: none; }
        
        .panel.active { 
            display: block; 
            animation: fadeScale 0.3s ease; 
        }
        
        @keyframes fadeScale { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .panel-title { 
            font-size: 0.8rem; 
            font-weight: 600; 
            margin-bottom: 0.75rem; 
            color: var(--primary-text); 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .panel-title::before, .panel-title::after {
            content: '';
            height: 1px;
            flex: 1;
            background: var(--border);
        }

        /* Buttons */
        .btn {
            background: var(--surface);
            color: var(--primary-text);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: var(--radius-btn);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            width: 100%; 
            margin-bottom: 0.5rem;
        }
        
        .btn:hover {
            background: var(--primary-bg);
            border-color: var(--secondary-text);
        }
        
        .btn:active { transform: scale(0.98); }
        
        .btn-primary { 
            background: var(--accent); 
            color: var(--surface); 
            border: none; 
            font-weight: 600;
        }
        
        .btn-primary:hover { 
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .row { display: flex; gap: 0.75rem; }

        /* Sliders */
        .slider-group { margin-bottom: 0.75rem; }
        .slider-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 0.4rem; 
            font-size: 0.75rem; 
            font-weight: 500;
            color: var(--primary-text);
        }
        .slider-val { 
            color: var(--secondary-text); 
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
            font-size: 0.7rem; 
        }
        
        input[type=range] { 
            -webkit-appearance: none; 
            width: 100%; 
            height: 3px; 
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }
        
        input[type=range] {
            background: linear-gradient(to right, var(--accent) var(--p, 50%), var(--border) var(--p, 50%));
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; 
            height: 14px; 
            width: 14px; 
            border-radius: 50%;
            background: var(--accent); 
            cursor: pointer; 
            border: 2px solid var(--surface);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease;
        }
        
        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.2);
        }

        /* Presets */
        .presets-scroll { 
            display: flex; 
            overflow-x: auto; 
            gap: 0.75rem; 
            padding-bottom: 0.5rem; 
            scrollbar-width: none; 
            padding-left: 2px;
            padding-right: 2px;
        }
        .presets-scroll::-webkit-scrollbar { display: none; }
        
        .preset-card {
            min-width: 72px; 
            height: 90px; 
            border-radius: var(--radius-card);
            background-color: var(--primary-bg); 
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border);
            display: flex; 
            align-items: flex-end; 
            justify-content: center;
            padding: 0.6rem 0.4rem; 
            cursor: pointer; 
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .preset-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.7));
            z-index: 1;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        
        .preset-card span { 
            font-size: 0.65rem; 
            font-weight: 600; 
            color: #ffffff;
            line-height: 1.1;
            text-align: center;
            z-index: 2;
            position: relative;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        .preset-card:hover { 
            border-color: var(--secondary-text);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .preset-card:active { transform: scale(0.95); }
        
        .preset-card.active { 
            border-color: var(--accent);
            border-width: 2px;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Frame Options */
        .frame-options {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .frame-option {
            min-width: 80px;
            height: 80px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .frame-option:hover {
            border-color: var(--secondary-text);
            transform: translateY(-2px);
        }

        .frame-option.active {
            border-color: var(--accent);
            background: rgba(128, 128, 128, 0.05);
        }

        .frame-preview {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #e5e5e5 0%, #f5f5f5 100%);
            position: relative;
        }

        .dark-mode .frame-preview {
            background: linear-gradient(135deg, #262626 0%, #404040 100%);
        }

        .frame-preview::after {
            content: '';
            position: absolute;
            inset: 8px;
            background: var(--surface);
        }

        .frame-option[data-frame="none"] .frame-preview {
            background: transparent;
            border: 2px dashed var(--border);
        }

        .frame-option[data-frame="none"] .frame-preview::after {
            display: none;
        }

        .frame-option[data-frame="rounded"] .frame-preview {
            border-radius: 8px;
        }

        .frame-option[data-frame="rounded"] .frame-preview::after {
            border-radius: 4px;
        }

        .frame-option[data-frame="circle"] .frame-preview {
            border-radius: 50%;
        }

        .frame-option[data-frame="circle"] .frame-preview::after {
            border-radius: 50%;
        }

        .frame-option[data-frame="polaroid"] .frame-preview {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .frame-option[data-frame="polaroid"] .frame-preview::after {
            inset: 4px 4px 12px 4px;
        }

        .frame-option[data-frame="shadow"] .frame-preview {
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .frame-option[data-frame="neon"] .frame-preview {
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.4);
        }

        .frame-option span {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .frame-option.active span {
            color: var(--accent);
            font-weight: 600;
        }

        .frame-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 1rem;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .color-picker-wrapper label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--primary-text);
            min-width: 60px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid var(--border);
            width: 40px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 4px;
            border: none;
        }

        /* Creator Wall - BHAT BOYKA */
        .creator-wall {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0.5rem 1rem;
            height: 100%;
            text-align: center;
            overflow-y: auto;
        }

        .creator-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a 0%, #404040 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            position: relative;
            box-shadow: var(--shadow-lg);
            flex-shrink: 0;
        }

        .dark-mode .creator-avatar {
            background: linear-gradient(135deg, #ffffff 0%, #a3a3a3 100%);
        }

        .creator-avatar::before {
            content: 'B';
            font-size: 1.75rem;
            font-weight: 800;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .dark-mode .creator-avatar::before {
            color: #1a1a1a;
        }

        .creator-avatar::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, var(--accent), var(--secondary-text));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .creator-name {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: var(--primary-text);
            margin-bottom: 0.15rem;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .creator-title {
            font-size: 0.65rem;
            color: var(--secondary-text);
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            flex-shrink: 0;

            flex-direction: column;

            cursor: pointer;
            padding: 6px 12px;

            border: none;

        .cropper-btn:hover {
            color: var(--primary-text);
            background: var(--primary-bg);
        }

        .cropper-btn.primary {
            background: var(--accent);
            color: var(--surface);
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 600;
        }

        .cropper-btn.primary:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* Aspect Ratio Presets */
        .ratio-preset {
            min-width: 48px;
            height: 48px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--secondary-text);
            flex-shrink: 0;
        }

        .ratio-preset:hover {
            border-color: var(--secondary-text);
            color: var(--primary-text);
            background: var(--primary-bg);
        }

        .ratio-preset.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(128, 128, 128, 0.1);
            font-weight: 600;
        }

        .ratio-preset .ratio-icon {
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-radius: 2px;
        }

        .ratio-preset[data-ratio="NaN"] .ratio-icon {
            border-style: dashed;
        }

        .ratio-preset[data-ratio="1"] .ratio-icon {
            width: 16px;
            height: 16px;
        }

        .ratio-preset[data-ratio="1.3333333333333333"] .ratio-icon {
            width: 20px;
            height: 14px;
        }

        .ratio-preset[data-ratio="0.75"] .ratio-icon {

            height: 20px;

        .ratio-preset[data-ratio="1.7777777777777777"] .ratio-icon {
            width: 22px;
            height: 12px;
        }

        .ratio-preset[data-ratio="0.5625"] .ratio-icon {
            width: 12px;
            height: 22px;
        }

        /* Two column layout for sliders */
        .sliders-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 1rem;

        @media (max-width: 380px) {

            .creator-socials {
                gap: 0.5rem;
            }

    <script>
        // Initialize Icons
        lucide.createIcons();

        // --- THEME TOGGLE ---
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        let isDarkMode = false;

        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode');
            
            // Update frame color based on theme
            const frameColorInput = document.getElementById('frame-color');
            if (isDarkMode) {
                themeIcon.setAttribute('data-lucide', 'sun');
                frameColorInput.value = '#1a1a1a';
                document.documentElement.style.setProperty('--frame-color', '#1a1a1a');
            } else {
                themeIcon.setAttribute('data-lucide', 'moon');
                frameColorInput.value = '#ffffff';
                document.documentElement.style.setProperty('--frame-color', '#ffffff');
            }
            lucide.createIcons();
        });

        // --- INITIAL LOAD ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.remove('active');
            }, 800);
        });

        // --- CONFIG & STATE ---
        const defState = {
            brightness: 1, contrast: 1, saturation: 1, exposure: 0, fade: 0, warmth: 0, sharpness: 0,
            blur: 0, grain: 0, vignette: 0, glow: 0, lightLeak: 0, dust: 0, clarity: 0
        };

        let state = { ...defState };
        let imgOrig = null;
        let imgPreview = null;
        let isCompare = false;
        let cropper = null;
        let croppedImageData = null;

        // Frame state
        let frameState = {
            type: 'none',
            padding: 0,
            radius: 8,
            shadow: 0,
            color: '#ffffff'
        };

        const presets = {
            'Clean': { brightness: 1.02, contrast: 1.1, saturation: 1.05, exposure: 0, fade: 0, warmth: 0, sharpness: 0.2, blur: 0, grain: 0, vignette: 0.1, glow: 0, lightLeak: 0, dust: 0, clarity: 0.1 },
            'Bright': { brightness: 1.15, contrast: 1.05, saturation: 1.1, exposure: 0.2, fade: 0, warmth: 0.1, sharpness: 0, blur: 0, grain: 0, vignette: 0, glow: 0.1, lightLeak: 0, dust: 0, clarity: 0 },
            'Warm': { brightness: 1.05, contrast: 1.05, saturation: 1.05, exposure: 0, fade: 0, warmth: 0.3, sharpness: 0, blur: 0, grain: 0, vignette: 0.1, glow: 0, lightLeak: 0, dust: 0, clarity: 0 },
            'Cool': { brightness: 1.02, contrast: 1.1, saturation: 0.9, exposure: 0, fade: 0, warmth: -0.2, sharpness: 0.1, blur: 0, grain: 0, vignette: 0.1, glow: 0, lightLeak: 0, dust: 0, clarity: 0.1 },
            'Noir': { brightness: 1, contrast: 1.4, saturation: 0, exposure: -0.1, fade: 0, warmth: 0, sharpness: 0.2, blur: 0, grain: 0.3, vignette: 0.5, glow: 0, lightLeak: 0, dust: 0, clarity: 0.3 },
            'Vintage': { brightness: 1, contrast: 0.9, saturation: 0.7, exposure: 0.1, fade: 0.3, warmth: 0.3, sharpness: 0, blur: 0.5, grain: 0.4, vignette: 0.3, glow: 0, lightLeak: 0.1, dust: 0.2, clarity: 0 },
            'Dramatic': { brightness: 0.95, contrast: 1.25, saturation: 1.1, exposure: -0.1, fade: 0, warmth: 0, sharpness: 0.3, blur: 0, grain: 0.1, vignette: 0.4, glow: 0, lightLeak: 0, dust: 0, clarity: 0.2 },
            'Soft': { brightness: 1.1, contrast: 0.9, saturation: 0.95, exposure: 0.1, fade: 0.2, warmth: 0.2, sharpness: 0, blur: 0.5, grain: 0, vignette: 0, glow: 0.2, lightLeak: 0, dust: 0, clarity: -0.1 },
            'Mono': { brightness: 1, contrast: 1.2, saturation: 0, exposure: 0, fade: 0.1, warmth: 0, sharpness: 0.2, blur: 0, grain: 0.2, vignette: 0.2, glow: 0, lightLeak: 0, dust: 0, clarity: 0.2 }
        };

        const controls = [
            { id: 'brightness', label: 'Brightness', min: 0.5, max: 1.5, step: 0.01, def: 1 },
            { id: 'contrast', label: 'Contrast', min: 0.5, max: 1.5, step: 0.01, def: 1 },

        const fx = [
            { id: 'blur', label: 'Blur', min: 0, max: 10, step: 0.1, def: 0 },
            { id: 'grain', label: 'Grain', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'vignette', label: 'Vignette', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'glow', label: 'Glow', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'lightLeak', label: 'Light Leak', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'dust', label: 'Dust', min: 0, max: 1, step: 0.01, def: 0 },
            { id: 'clarity', label: 'Clarity', min: -1, max: 1, step: 0.01, def: 0 }
        ];

        // --- DOM ---
        const $ = id => document.getElementById(id);
        const canvas = $('canvas');
        const ctx = canvas.getContext('2d');
        const panelsWrap = $('panels');
        const navBtns = document.querySelectorAll('.nav-btn');
        const canvasFrame = $('canvas-frame');

        // --- PATTERNS ---
        let patGrain, patDust;
        function initPatterns() {
            const c = document.createElement('canvas');
            c.width = 256; c.height = 256;
            const x = c.getContext('2d');
            
            const idata = x.createImageData(256, 256);
            for(let i=0; i<idata.data.length; i+=4) {
                const v = Math.random()*255;
                idata.data[i] = idata.data[i+1] = idata.data[i+2] = v;
                idata.data[i+3] = 150;
            }
            x.putImageData(idata, 0, 0);
            patGrain = ctx.createPattern(c, 'repeat');

            x.clearRect(0,0,256,256);
            x.fillStyle = '#fff';
            for(let i=0; i<80; i++) {
                x.beginPath(); x.arc(Math.random()*256, Math.random()*256, Math.random()*1.2, 0, Math.PI*2); x.fill();
            }
            x.strokeStyle = '#fff';
            for(let i=0; i<10; i++) {
                x.beginPath(); x.moveTo(Math.random()*256, Math.random()*256); x.lineTo(Math.random()*256, Math.random()*256);
                x.lineWidth = Math.random(); x.stroke();
            }
            patDust = ctx.createPattern(c, 'repeat');
        }
        initPatterns();

        // --- UI BUILDER ---
        function updateSliderFill(el) {
            const min = parseFloat(el.min);
            const max = parseFloat(el.max);
            const val = parseFloat(el.value);
            const pct = ((val - min) / (max - min)) * 100;
            el.style.setProperty('--p', `${pct}%`);
        }

        function buildSliders(containerId, config) {
            const cont = $(containerId);
            config.forEach(c => {
                cont.innerHTML += `
                    <div class="slider-group">
                        <div class="slider-header"><span>${c.label}</span><span class="slider-val" id="val-${c.id}">${c.def.toFixed(2)}</span></div>
                        <input type="range" id="sl-${c.id}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.def}">
                    </div>
                `;
            });
            config.forEach(c => {
                const slider = $(`sl-${c.id}`);
                updateSliderFill(slider); 
                
                slider.addEventListener('input', e => {
                    state[c.id] = parseFloat(e.target.value);
                    $(`val-${c.id}`).innerText = state[c.id].toFixed(2);
                    updateSliderFill(e.target);
                    document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
                    triggerRender();
                });
            });
        }

        function buildPresets() {
            const cont = $('presets-container');
            Object.keys(presets).forEach(k => {
                const div = document.createElement('div');
                div.className = 'preset-card';
                div.id = `preset-card-${k.replace(/\s+/g, '-')}`;
                div.innerHTML = `<span>${k}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    state = { ...defState, ...presets[k] };
                    updateSlidersUI();
                    triggerRender();
                };
                cont.appendChild(div);
            });
        }

        function updateSlidersUI() {
            [...controls, ...fx].forEach(c => {
                const slider = $(`sl-${c.id}`);
                if(slider) {
                    slider.value = state[c.id];
                    $(`val-${c.id}`).innerText = state[c.id].toFixed(2);
                    updateSliderFill(slider);
                }
            });
        }

        buildSliders('sliders-control', controls);
        buildSliders('sliders-fx', fx);
        buildPresets();

        // --- FRAME CONTROLS ---
        const frameOptions = document.querySelectorAll('.frame-option');
        frameOptions.forEach(option => {
            option.addEventListener('click', () => {
                frameOptions.forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                frameState.type = option.dataset.frame;
                applyFrame();
            });
        });

        // Frame sliders
        const framePaddingSlider = $('sl-frame-padding');
        const frameRadiusSlider = $('sl-frame-radius');
        const frameShadowSlider = $('sl-frame-shadow');
        const frameColorInput = $('frame-color');

        framePaddingSlider.addEventListener('input', (e) => {
            frameState.padding = parseInt(e.target.value);
            $('val-frame-padding').textContent = frameState.padding;
            updateSliderFill(e.target);
            applyFrame();
        });

        frameRadiusSlider.addEventListener('input', (e) => {
            frameState.radius = parseInt(e.target.value);
            $('val-frame-radius').textContent = frameState.radius;
            updateSliderFill(e.target);
            applyFrame();
        });

        frameShadowSlider.addEventListener('input', (e) => {
            frameState.shadow = parseInt(e.target.value);
            $('val-frame-shadow').textContent = frameState.shadow;
            updateSliderFill(e.target);
            applyFrame();
        });

        frameColorInput.addEventListener('input', (e) => {
            frameState.color = e.target.value;
            applyFrame();
        });

        function applyFrame() {
            const root = document.documentElement;
            
            // Apply based on frame type
            switch(frameState.type) {
                case 'none':
                    root.style.setProperty('--frame-padding', '0');
                    root.style.setProperty('--frame-radius', '8');
                    root.style.setProperty('--frame-shadow', '0');
                    canvasFrame.style.borderRadius = '8px';
                    canvasFrame.style.padding = '0';
                    canvas.style.borderRadius = '8px';
                    break;
                case 'rounded':
                    root.style.setProperty('--frame-padding', frameState.padding.toString());
                    root.style.setProperty('--frame-radius', Math.max(frameState.radius, 16).toString());
                    root.style.setProperty('--frame-shadow', frameState.shadow.toString());
                    canvasFrame.style.background = frameState.color;
                    break;
                case 'circle':
                    root.style.setProperty('--frame-padding', frameState.padding.toString());
                    root.style.setProperty('--frame-radius', '50');
                    root.style.setProperty('--frame-shadow', frameState.shadow.toString());
                    canvasFrame.style.background = frameState.color;
                    canvasFrame.style.aspectRatio = '1';
                    break;
                case 'polaroid':
                    root.style.setProperty('--frame-padding', Math.max(frameState.padding, 12).toString());
                    root.style.setProperty('--frame-radius', Math.max(frameState.radius, 4).toString());
                    root.style.setProperty('--frame-shadow', Math.max(frameState.shadow, 10).toString());
                    canvasFrame.style.background = frameState.color;
                    break;
                case 'shadow':
                    root.style.setProperty('--frame-padding', frameState.padding.toString());
                    root.style.setProperty('--frame-radius', frameState.radius.toString());
                    root.style.setProperty('--frame-shadow', Math.max(frameState.shadow, 20).toString());
                    canvasFrame.style.background = frameState.color;
                    break;
            }
            
            // Update CSS variables
            if (frameState.type !== 'none') {
                root.style.setProperty('--frame-padding', frameState.padding.toString());
                root.style.setProperty('--frame-radius', frameState.radius.toString());
                root.style.setProperty('--frame-shadow', frameState.shadow.toString());
                canvasFrame.style.background = frameState.color;
            }
            
            // Update canvas border radius
            canvas.style.borderRadius = frameState.type === 'circle' ? '50%' : `${frameState.radius * 0.5}px`;
        }

        // Initialize frame sliders
        updateSliderFill(framePaddingSlider);
        updateSliderFill(frameRadiusSlider);
        updateSliderFill(frameShadowSlider);

        // --- PRESET THUMBNAIL GENERATOR ---
        function generatePresetThumbnails(sourceImg) {
            const maxThumb = 150;
            let w = sourceImg.width, h = sourceImg.height;
            if (w > maxThumb || h > maxThumb) {
                const r = Math.min(maxThumb/w, maxThumb/h);
                w *= r; h *= r;
            }
            
            const tCanvas = document.createElement('canvas');
            tCanvas.width = w; tCanvas.height = h;
            const tCtx = tCanvas.getContext('2d');
            tCtx.drawImage(sourceImg, 0, 0, w, h);
            
            const thumbImg = new Image();
            thumbImg.onload = () => {
                const renderCanvas = document.createElement('canvas');
                const renderCtx = renderCanvas.getContext('2d');
                
                Object.keys(presets).forEach(k => {
                    const presetState = { ...defState, ...presets[k] };
                    draw(renderCanvas, renderCtx, thumbImg, presetState);
                    const dataUrl = renderCanvas.toDataURL('image/jpeg', 0.6);
                    const card = document.getElementById(`preset-card-${k.replace(/\s+/g, '-')}`);
                    if(card) {
                        card.style.backgroundImage = `url(${dataUrl})`;
                    }
                });
            };
            thumbImg.src = tCanvas.toDataURL('image/jpeg', 0.8);
        }

        // --- NAVIGATION ---
        navBtns.forEach(btn => {
            btn.onclick = () => {
                const target = btn.dataset.target;
                
                if(btn.classList.contains('active') && panelsWrap.classList.contains('active')) {
                    closePanel();
                    return;
                }

                navBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                $(`p-${target}`).classList.add('active');
                panelsWrap.classList.add('active');
                document.body.classList.add('panel-open');
            };
        });

        function closePanel() {
            panelsWrap.classList.remove('active');
            document.body.classList.remove('panel-open');
            navBtns.forEach(b => b.classList.remove('active'));
        }

        $('panelHandle').addEventListener('click', closePanel);

        $('main').addEventListener('click', (e) => {
            if(e.target === $('main') || e.target.closest('#canvas-frame')) {
                closePanel();
            }
        });

        // --- CROPPER PHASE ---
        const emptyState = $('empty-state');
        const cropperContainer = $('cropperContainer');
        const imageToCrop = $('imageToCrop');
        const cropperFooter = $('cropperFooter');

        $('empty-state').onclick = () => $('file-input').click();
        $('btn-upload').onclick = () => {
            $('file-input').click();
            closePanel();
        };

        $('file-input').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            
            $('loading-overlay').classList.add('active');
            
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    imgOrig = img;
                    imageToCrop.src = ev.target.result;
                    
                    emptyState.style.display = 'none';
                    cropperContainer.classList.add('visible');
                    
                    document.body.classList.remove('editor-phase');
                    document.body.classList.add('cropper-phase');
                    
                    initCropper();
                    
                    setTimeout(() => {
                        $('loading-overlay').classList.remove('active');
                    }, 500);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        function initCropper() {
            if(cropper) cropper.destroy();
            
            cropper = new Cropper(imageToCrop, {
                viewMode: 1,
                dragMode: 'crop',
                autoCropArea: 0.8,
                restore: false,
                guides: true,
                center: false,
                highlight: false,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: false,
                zoomable: true,
                wheelZoomRatio: 0.1
            });
        }

        document.querySelectorAll('.ratio-preset').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ratio-preset').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const ratio = parseFloat(btn.dataset.ratio);
                cropper.setAspectRatio(ratio);
            });
        });

        $('btnRotateL').onclick = () => cropper.rotate(-90);
        
        let scaleX = 1;
        $('btnFlipH').onclick = () => {
            scaleX = scaleX === 1 ? -1 : 1;
            cropper.scaleX(scaleX);
        };

        $('btnConfirmCrop').onclick = () => {
            if(!cropper) return;
            
            $('loading-overlay').classList.add('active');
            
            setTimeout(() => {
                const croppedCanvas = cropper.getCroppedCanvas({
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                });
                
                croppedImageData = croppedCanvas.toDataURL('image/jpeg', 0.95);
                
                const img = new Image();
                img.onload = () => {
                    const max = 1200;
                    let w = img.width, h = img.height;
                    if(w > max || h > max) {
                        const r = Math.min(max/w, max/h);
                        w *= r; h *= r;
                    }
                    
                    const pc = document.createElement('canvas');
                    pc.width = w; pc.height = h;
                    pc.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    const pImg = new Image();
                    pImg.onload = () => {
                        imgPreview = pImg;
                        
                        document.body.classList.remove('cropper-phase');
                        document.body.classList.add('editor-phase');
                        
                        canvasFrame.classList.add('visible');
                        state = { ...defState };
                        updateSlidersUI();
                        document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
                        
                        generatePresetThumbnails(pImg);
                        triggerRender();
                        
                        $('loading-overlay').classList.remove('active');
                        
                        setTimeout(() => navBtns[1].click(), 300);
                    };
                    pImg.src = pc.toDataURL('image/jpeg', 0.8);
                };
                img.src = croppedImageData;
            }, 100);
        };

        // --- RENDER ENGINE ---
        let renderFrame = null;
        let isRendering = false;
        let renderQueued = false;

        function triggerRender() {
            if (isRendering) {
                renderQueued = true;
                return;
            }
            
            isRendering = true;
            renderFrame = requestAnimationFrame(() => {
                draw(canvas, ctx, imgPreview, state);
                isRendering = false;
                
                if (renderQueued) {
                    renderQueued = false;
                    setTimeout(triggerRender, 5);
                }
            });
        }

        function draw(cvs, cx, img, renderState = state) {
            if(!img) return;
            cvs.width = img.width; cvs.height = img.height;
            const w = cvs.width, h = cvs.height;

            if(isCompare && renderState === state) {
                cx.drawImage(img, 0, 0, w, h);
                return;
            }

            const b = renderState.brightness + renderState.exposure;
            const c = renderState.contrast + (renderState.clarity * 0.2);
            const s = renderState.saturation + (renderState.clarity * 0.1);
            const bl = renderState.blur;
            
            cx.filter = `brightness(${b}) contrast(${c}) saturate(${s}) blur(${bl}px)`;
            cx.drawImage(img, 0, 0, w, h);
            cx.filter = 'none';

            if(renderState.warmth !== 0) {
                cx.globalCompositeOperation = 'overlay';
                cx.fillStyle = renderState.warmth > 0 ? `rgba(255,140,0,${renderState.warmth*0.35})` : `rgba(0,130,255,${-renderState.warmth*0.35})`;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.fade > 0) {
                cx.globalCompositeOperation = 'screen';
                cx.fillStyle = `rgba(40,40,40,${renderState.fade*0.6})`;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.sharpness > 0 || renderState.clarity > 0) {
                cx.globalCompositeOperation = 'overlay';
                cx.globalAlpha = (renderState.sharpness * 0.5) + (renderState.clarity * 0.3);
                cx.filter = 'contrast(1.5) grayscale(1)';
                cx.drawImage(img, 0, 0, w, h);
                cx.filter = 'none';
                cx.globalAlpha = 1;
            }

                        if(renderState.glow > 0) {
                cx.globalCompositeOperation = 'screen';
                cx.globalAlpha = renderState.glow * 0.6;
                cx.filter = 'blur(15px) contrast(1.2)';
                cx.drawImage(img, 0, 0, w, h);
                cx.filter = 'none';
                cx.globalAlpha = 1;
            }

            if(renderState.lightLeak > 0) {
                cx.globalCompositeOperation = 'screen';
                const grad = cx.createLinearGradient(0, 0, w*0.6, h*0.6);
                grad.addColorStop(0, `rgba(255, 100, 50, ${renderState.lightLeak * 0.7})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                cx.fillStyle = grad;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.vignette > 0) {
                cx.globalCompositeOperation = 'multiply';
                const grad = cx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.7);
                grad.addColorStop(0.4, 'rgba(255,255,255,1)');
                grad.addColorStop(1, `rgba(150,150,150,${1 - renderState.vignette})`);
                cx.fillStyle = grad;
                cx.fillRect(0,0,w,h);
            }

            if(renderState.grain > 0) {
                cx.globalCompositeOperation = 'overlay';
                cx.globalAlpha = renderState.grain * 0.8;
                cx.fillStyle = patGrain;
                cx.fillRect(0,0,w,h);
                cx.globalAlpha = 1;
            }

            if(renderState.dust > 0) {
                cx.globalCompositeOperation = 'screen';
                cx.globalAlpha = renderState.dust * 0.7;
                cx.fillStyle = patDust;
                cx.fillRect(0,0,w,h);
                cx.globalAlpha = 1;
            }

            cx.globalCompositeOperation = 'source-over';
        }

        // --- EDITOR ACTIONS ---
        $('btn-reset').onclick = () => {
            state = { ...defState };
            updateSlidersUI();
            document.querySelectorAll('.preset-card').forEach(el => el.classList.remove('active'));
            triggerRender();
        };

        const compBtn = $('btn-compare');
        const startComp = () => { isCompare = true; triggerRender(); };
        const endComp = () => { isCompare = false; triggerRender(); };
        compBtn.onmousedown = startComp; compBtn.onmouseup = endComp; compBtn.onmouseleave = endComp;
        compBtn.ontouchstart = (e) => { e.preventDefault(); startComp(); };
        compBtn.ontouchend = endComp;

        $('btn-export').onclick = () => {
            if(!imgPreview) return;
            
            $('export-overlay').classList.add('active');
            
            setTimeout(() => {
                // Create export canvas with frame
                const exportCanvas = document.createElement('canvas');
                const exportCtx = exportCanvas.getContext('2d');
                
                // Calculate dimensions with frame
                const padding = frameState.padding;
                const totalPadding = padding * 2;
                
                exportCanvas.width = imgPreview.width + totalPadding;
                exportCanvas.height = imgPreview.height + totalPadding;
                
                // Fill background
                exportCtx.fillStyle = frameState.color;
                exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
                
                // Apply corner radius to frame
                if (frameState.radius > 0 || frameState.type === 'circle') {
                    exportCtx.globalCompositeOperation = 'destination-in';
                    exportCtx.beginPath();
                    const radius = frameState.type === 'circle' ? Math.min(exportCanvas.width, exportCanvas.height) / 2 : frameState.radius;
                    exportCtx.roundRect(0, 0, exportCanvas.width, exportCanvas.height, radius);
                    exportCtx.fill();
                    exportCtx.globalCompositeOperation = 'source-over';
                }
                
                // Draw filtered image
                const imgCanvas = document.createElement('canvas');
                imgCanvas.width = imgPreview.width;
                imgCanvas.height = imgPreview.height;
                draw(imgCanvas, imgCanvas.getContext('2d'), imgPreview, state);
                
                // Draw image with its own radius
                const imgRadius = frameState.type === 'circle' ? Math.min(imgPreview.width, imgPreview.height) / 2 : frameState.radius * 0.5;
                if (imgRadius > 0) {
                    exportCtx.save();
                    exportCtx.beginPath();
                    exportCtx.roundRect(padding, padding, imgPreview.width, imgPreview.height, imgRadius);
                    exportCtx.clip();
                    exportCtx.drawImage(imgCanvas, padding, padding);
                    exportCtx.restore();
                } else {
                    exportCtx.drawImage(imgCanvas, padding, padding);
                }
                
                const link = document.createElement('a');
                link.download = `velora-edit-${Date.now()}.png`;
                link.href = exportCanvas.toDataURL('image/png');
                link.click();
                
                setTimeout(() => {
                    $('export-overlay').classList.remove('active');
                }, 800);
            }, 100);
        };

    </script>
</body>
